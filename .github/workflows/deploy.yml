name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Get Pages URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.html_url' | sed 's|https://||')
          echo "PAGES_URL=$url" >> $GITHUB_ENV

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Build with Next.js
        run: pnpm next build
        env:
          NEXT_PUBLIC_UNSPLASH_CLIENT_ID: ${{ vars.NEXT_PUBLIC_UNSPLASH_CLIENT_ID }}
          NEXT_PUBLIC_UNSPLASH_USERNAME: ${{ vars.NEXT_PUBLIC_UNSPLASH_USERNAME }}
          NEXT_PUBLIC_VINCE_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_VINCE_SCRIPT_URL }}
          NEXT_PUBLIC_PAGES_DOMAIN: ${{ env.PAGES_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4